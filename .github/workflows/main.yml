name: Production Deployment

on:
  push:
    branches: [ "master" ]

jobs:
    transaction-api:
        name: deploy-transaction-api
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v3
  
        - name: App Settings Variable Substitution
          uses: microsoft/variable-substitution@v1
          with:
            files: 'src/ElevaniPaymentGateway.API.Transaction/appsettings.json'
          env:
              ConnectionStrings.PGDatabaseCon: ${{ secrets.PROD_DB_CONNECTION }} # uses the production database
              AppSettingsConfig.IsAppLive: true
              JwtConfig.Key:  ${{ secrets.PROD_JWT_SECRETKEY }} # uses the production JWT secret key
              GratipConfig.BaseUrl: ${{ secrets.PROD_GRATIP_BASEURL }} # uses the production GRATIP base url
              GratipConfig.APIKey: ${{ secrets.PROD_GRATIP_API_KEY }} # uses the production GRATIP API key
              GratipConfig.APISecret: ${{ secrets.PROD_GRATIP_API_SECRET }} # uses the production GRATIP API Secret
              EncryptorConfig.IV: ${{ secrets.PROD_ENCRYPTION_IV }} # uses the production encryption IV
              EncryptorConfig.Key: ${{ secrets.PROD_ENCRYPTION_KEY }} # uses the production encryption KEY
              AppSettingsConfig.EnableAPIEncryption: false # uses the production encryption KEY
    
        - name: Build the Docker image
          #working-directory: src/PrimeElectronics.API
          run: docker build . -t sawdykdocker/elevani_trans_prod_api:latest -f docker/transaction-api/Dockerfile

        - name: Log into Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Push the image to Docker Hub
          run: docker push sawdykdocker/elevani_trans_prod_api:latest

        - name: Pull the image to VM
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.PROD_VPS_IP }}
            username: ${{ secrets.PROD_VPS_USER }}
            password: ${{ secrets.PROD_VPS_PASSWORD }}
            script: |
              docker image prune --all
              docker stop elevani_trans_prod_api || true
              docker rm elevani_trans_prod_api -f || true
              docker rmi sawdykdocker/elevani_trans_prod_api -f || true
              docker image pull sawdykdocker/elevani_trans_prod_api:latest
              cd /root/ElevaniApp/Backend/TransactionAPI
              docker compose up -d #run in detach mode

    admin-api:
        name: deploy-admin-api
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v3
  
        - name: App Settings Variable Substitution
          uses: microsoft/variable-substitution@v1
          with:
            files: 'src/ElevaniPaymentGateway.API.Admin/appsettings.json'
          env:
              ConnectionStrings.PGDatabaseCon: ${{ secrets.PROD_DB_CONNECTION }} # uses the production database
              AppSettingsConfig.IsAppLive: true
              JwtConfig.Key:  ${{ secrets.PROD_JWT_SECRETKEY }} # uses the production JWT secret key
              GratipConfig.BaseUrl: ${{ secrets.PROD_GRATIP_BASEURL }} # uses the production GRATIP base url
              GratipConfig.APIKey: ${{ secrets.PROD_GRATIP_API_KEY }} # uses the production GRATIP API key
              GratipConfig.APISecret: ${{ secrets.PROD_GRATIP_API_SECRET }} # uses the production GRATIP API Secret
              EncryptorConfig.IV: ${{ secrets.PROD_ENCRYPTION_IV }} # uses the production encryption IV
              EncryptorConfig.Key: ${{ secrets.PROD_ENCRYPTION_KEY }} # uses the production encryption KEY
              AppSettingsConfig.EnableAPIEncryption: false # uses the production encryption KEY
    
        - name: Build the Docker image
          #working-directory: src/PrimeElectronics.API
          run: docker build . -t sawdykdocker/elevani_admin_prod_api:latest -f docker/admin-api/Dockerfile

        - name: Log into Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Push the image to Docker Hub
          run: docker push sawdykdocker/elevani_admin_prod_api:latest

        - name: Pull the image to VM
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.PROD_VPS_IP }}
            username: ${{ secrets.PROD_VPS_USER }}
            password: ${{ secrets.PROD_VPS_PASSWORD }}
            script: |
              docker image prune --all
              docker stop elevani_admin_prod_api || true
              docker rm elevani_admin_prod_api -f || true
              docker rmi sawdykdocker/elevani_admin_prod_api -f || true
              docker image pull sawdykdocker/elevani_admin_prod_api:latest
              cd /root/ElevaniApp/Backend/AdminAPI
              docker compose up -d #run in detach mode

    gratip-job:
        name: deploy-gratip-job
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v3
  
        - name: App Settings Variable Substitution
          uses: microsoft/variable-substitution@v1
          with:
            files: 'src/ElevaniPaymentGateway.Worker.Gratip/appsettings.json'
          env:
              ConnectionStrings.PGDatabaseCon: ${{ secrets.PROD_DB_CONNECTION }} # uses the production database
              GratipConfig.BaseUrl: ${{ secrets.PROD_GRATIP_BASEURL }} # uses the production GRATIP base url
              GratipConfig.APIKey: ${{ secrets.PROD_GRATIP_API_KEY }} # uses the production GRATIP API key
              GratipConfig.APISecret: ${{ secrets.PROD_GRATIP_API_SECRET }} # uses the production GRATIP API Secret
    
        - name: Build the Docker image
          #working-directory: src/PrimeElectronics.API
          run: docker build . -t sawdykdocker/elevani_gratip_prod_job:latest -f docker/gratip-job/Dockerfile

        - name: Log into Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Push the image to Docker Hub
          run: docker push sawdykdocker/elevani_gratip_prod_job:latest

        - name: Pull the image to VM
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.PROD_VPS_IP }}
            username: ${{ secrets.PROD_VPS_USER }}
            password: ${{ secrets.PROD_VPS_PASSWORD }}
            script: |
              docker image prune --all
              docker stop elevani_gratip_prod_job || true
              docker rm elevani_gratip_prod_job -f || true
              docker rmi sawdykdocker/elevani_gratip_prod_job -f || true
              docker image pull sawdykdocker/elevani_gratip_prod_job:latest
              cd /root/ElevaniApp/Backend/GratipJob
              docker compose up -d #run in detach mode
    
    
